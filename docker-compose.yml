version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omar
      POSTGRES_PASSWORD: omar_secret
      POSTGRES_DB: omar_clinic_pro
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omar -d omar_clinic_pro']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omar-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omar-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://omar:omar_secret@postgres:5432/omar_clinic_pro?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-in-production}
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: omar-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    container_name: omar-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  backup:
    image: postgres:16-alpine
    container_name: omar-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: omar_secret
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "while true; do
        pg_dump -h postgres -U omar omar_clinic_pro > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql;
        find /backups -name 'backup_*.sql' -mtime +7 -delete;
        sleep 86400;
      done"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
